<body>
<div id="root"></div>

<div id="boot-error"></div>
<script>
  window.addEventListener("error", function (e) {
    var box = document.getElementById("boot-error");
    box.style.display = "block";
    box.innerHTML = "<h2>読み込みエラー</h2>" +
      "このスクリーンショットを見せてもらえれば原因を特定できます。<br><br>" +
      (e.message || "不明なエラー") + "<br>" +
      (e.filename ? e.filename + ":" + e.lineno : "");
  });
  setTimeout(function () {
    if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
      var box = document.getElementById("boot-error");
      box.style.display = "block";
      box.innerHTML = "<h2>読み込みエラー</h2>React本体の読み込みに失敗しました。" +
        "通信環境を確認し、再読み込みしてください。（社内Wi-Fi等でCDNがブロックされている場合があります）";
    }
  }, 4000);
</script>

<script>
const e = React.createElement;
const { useState, useMemo } = React;

function IconBase({ children, size = 16, className = "" }) {
  return e("svg", {
    xmlns: "http://www.w3.org/2000/svg", width: size, height: size, viewBox: "0 0 24 24",
    fill: "none", stroke: "currentColor", strokeWidth: "2", strokeLinecap: "round", strokeLinejoin: "round",
    className,
  }, children);
}
const TrendingUp = (p) => e(IconBase, p,
  e("polyline", { key: "1", points: "22 7 13.5 15.5 8.5 10.5 2 17" }),
  e("polyline", { key: "2", points: "16 7 22 7 22 13" })
);
const TrendingDown = (p) => e(IconBase, p,
  e("polyline", { key: "1", points: "22 17 13.5 8.5 8.5 13.5 2 7" }),
  e("polyline", { key: "2", points: "16 17 22 17 22 11" })
);
const AlertTriangle = (p) => e(IconBase, p,
  e("path", { key: "1", d: "m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z" }),
  e("line", { key: "2", x1: "12", y1: "9", x2: "12", y2: "13" }),
  e("line", { key: "3", x1: "12", y1: "17", x2: "12.01", y2: "17" })
);
const Info = (p) => e(IconBase, p,
  e("circle", { key: "1", cx: "12", cy: "12", r: "10" }),
  e("line", { key: "2", x1: "12", y1: "16", x2: "12", y2: "12" }),
  e("line", { key: "3", x1: "12", y1: "8", x2: "12.01", y2: "8" })
);

// A型3銘柄はすべてTOPIX500構成のため細かい呼値を使う（rulebook v1.5 §2.4・§3）
function tickSize(price) {
  if (price <= 1000) return 0.1;
  if (price <= 3000) return 0.5;
  if (price <= 10000) return 1;
  if (price <= 30000) return 5;
  return 10;
}
function roundDownTick(price, tick) {
  const steps = Math.floor(price / tick + 1e-6);
  return Math.round(steps * tick * 100) / 100;
}
function fmt(n) { return (n === null || n === undefined || Number.isNaN(n)) ? "―" : Math.round(n).toLocaleString("ja-JP"); }
function fmtPrice(n) { return (n === null || n === undefined || Number.isNaN(n)) ? "―" : n.toLocaleString("ja-JP", { maximumFractionDigits: 2 }); }

// ---- 監視リスト27銘柄辞書（rulebook v1.5 §2.1・2.4、2026-07-23判定） ----
const WATCH_ENTRIES = [
  { code: "5803", name: "フジクラ",     sector: "非鉄金属", cls: "green", rank: 1 },
  { code: "8306", name: "三菱UFJ",      sector: "銀行",     cls: "green", rank: 2 },
  { code: "8316", name: "三井住友FG",   sector: "銀行",     cls: "green", rank: 3 },
  { code: "5016", name: "JX金属",       sector: "非鉄金属", cls: "green", rank: 4 },
  { code: "5801", name: "古河電工",     sector: "非鉄金属", cls: "green", rank: 5 },
  { code: "8411", name: "みずほ",       sector: "銀行",     cls: "green", rank: 6 },
  { code: "8766", name: "東京海上",     sector: "保険",     cls: "green", rank: 7 },
  { code: "5802", name: "住友電工",     sector: "非鉄金属", cls: "green", rank: 8 },
  { code: "8725", name: "MS&AD",        sector: "保険",     cls: "green", rank: 9 },
  { code: "5713", name: "住友鉱山",     sector: "非鉄金属", cls: "green", rank: 10 },
  { code: "8729", name: "ソニーFG",     sector: "保険",     cls: "green", rank: 11 },
  { code: "8308", name: "りそな",       sector: "銀行",     cls: "green", rank: 12 },
  { code: "7182", name: "ゆうちょ",     sector: "銀行",     cls: "green", rank: 13 },
  { code: "8750", name: "第一生命",     sector: "保険",     cls: "green", rank: 14 },
  { code: "5108", name: "ブリヂストン", sector: "ゴム",     cls: "green", rank: 15 },
  { code: "8630", name: "SOMPO",        sector: "保険",     cls: "green", rank: 16 },
  { code: "8309", name: "三井住友TR",   sector: "銀行",     cls: "green", rank: 17 },
  { code: "8795", name: "T&D",          sector: "保険",     cls: "green", rank: 18 },
  { code: "5101", name: "横浜ゴム",     sector: "ゴム",     cls: "green", rank: 19 },
  { code: "5711", name: "三菱マテ",     sector: "非鉄金属", cls: "green", rank: 20 },
  { code: "5714", name: "DOWA",         sector: "非鉄金属", cls: "yellow", rank: null },
  { code: "5110", name: "住友ゴム",     sector: "ゴム",     cls: "yellow", rank: null },
  { code: "5105", name: "TOYO TIRE",    sector: "ゴム",     cls: "yellow", rank: null },
  { code: "7181", name: "かんぽ生命",   sector: "保険",     cls: "yellow", rank: null },
  { code: "9364", name: "上組",         sector: "倉庫運輸", cls: "yellow", rank: null, noMarket: true },
  { code: "9301", name: "三菱倉庫",     sector: "倉庫運輸", cls: "yellow", rank: null, noMarket: true },
  { code: "9302", name: "三井倉庫",     sector: "倉庫運輸", cls: "yellow", rank: null, noMarket: true },
];
const WATCHLIST = WATCH_ENTRIES.reduce((acc, x) => { acc[x.code] = x; return acc; }, {});
const GREEN_ENTRIES = WATCH_ENTRIES.filter((x) => x.cls === "green");
const YELLOW_ENTRIES = WATCH_ENTRIES.filter((x) => x.cls === "yellow");
const FINANCIAL_SECTORS = ["銀行", "保険"];
const NO_MARKET_CODES = ["9364", "9301", "9302"];

function normalizeCode(code) { return (code || "").trim(); }

function computeViolations(slots) {
  const filled = slots
    .map((s, i) => ({ idx: i, code: normalizeCode(s.code) }))
    .filter((s) => s.code.length === 4);
  const violations = [];

  // 1. 重複
  const countByCode = {};
  filled.forEach((s) => { countByCode[s.code] = (countByCode[s.code] || 0) + 1; });
  Object.keys(countByCode).forEach((code) => {
    if (countByCode[code] >= 2) {
      const info = WATCHLIST[code];
      violations.push({
        level: "error",
        text: `重複: ${code}${info ? "（" + info.name + "）" : ""}が${countByCode[code]}枠で重複しています。同一銘柄の重複保有は不可`,
      });
    }
  });

  // 2. セクター上限（4枠以上で違反＝最大3銘柄）
  const sectorCount = {};
  filled.forEach((s) => {
    const info = WATCHLIST[s.code];
    if (info) sectorCount[info.sector] = (sectorCount[info.sector] || 0) + 1;
  });
  Object.keys(sectorCount).forEach((sector) => {
    if (sectorCount[sector] >= 4) {
      violations.push({
        level: "error",
        text: `セクター上限超過: 「${sector}」が${sectorCount[sector]}銘柄です。同一セクターは最大3銘柄（§2.2②）`,
      });
    }
  });

  // 3. 金融クラスタ上限（5枠以上で違反＝最大4銘柄）
  const finCount = filled.filter((s) => {
    const info = WATCHLIST[s.code];
    return info && FINANCIAL_SECTORS.includes(info.sector);
  }).length;
  if (finCount >= 5) {
    violations.push({
      level: "error",
      text: `金融クラスタ上限超過: 銀行＋保険 合計${finCount}銘柄です。金融（銀行＋保険）は最大4銘柄（§2.2③）`,
    });
  }

  // 4. 非監視銘柄
  filled.forEach((s) => {
    if (!WATCHLIST[s.code]) {
      violations.push({
        level: "error",
        text: `枠${s.idx + 1}: コード${s.code}は監視リスト27銘柄外。フェニックス発注対象外`,
      });
    }
  });

  // 5. 黄区分（注意）
  filled.forEach((s) => {
    const info = WATCHLIST[s.code];
    if (info && info.cls === "yellow") {
      violations.push({
        level: "warn",
        text: `枠${s.idx + 1}: ${info.name}（${s.code}）は黄区分。緑で5枠が埋まらない時のみ使用`,
      });
    }
  });

  // 6. 成行禁止
  filled.forEach((s) => {
    if (NO_MARKET_CODES.includes(s.code)) {
      const info = WATCHLIST[s.code];
      violations.push({
        level: "error",
        text: `枠${s.idx + 1}: ${info.name}（${s.code}）は成行禁止（指値のみ・旧赤運用継続）`,
      });
    }
  });

  return violations;
}

function computePhoenixSlot(entry, morningLow) {
  const RISK_CAP = 77000, NOTIONAL_CAP = 1027000, SL_BUFFER = 0.003, TP_MULT = 1.05, TRAIL_MULT = 1.015;
  const en = parseFloat(entry), ml = parseFloat(morningLow);
  if (!en || !ml || en <= 0 || ml <= 0) return null;
  const sl = ml * (1 - SL_BUFFER);
  const riskPerShare = en - sl;
  if (riskPerShare <= 0) return { error: "前引け値が前場安値以下です。入力を確認してください。" };
  const tp = en * TP_MULT, trailTrigger = en * TRAIL_MULT;
  const sharesByRisk = Math.floor(RISK_CAP / riskPerShare / 100) * 100;
  const sharesByNotional = Math.floor(NOTIONAL_CAP / en / 100) * 100;
  const finalShares = Math.min(sharesByRisk, sharesByNotional);
  if (finalShares <= 0) return { error: "建玉代金上限に対して株価が高すぎます（100株単位で購入不可）。見送り推奨。" };
  const binding = sharesByRisk <= sharesByNotional ? "risk" : "notional";
  return {
    sl, tp, trailTrigger, riskPerShare, sharesByRisk, sharesByNotional, finalShares, binding,
    positionValue: finalShares * en, maxLoss: finalShares * riskPerShare, maxGain: finalShares * (tp - en),
  };
}

function NumberField({ label, value, onChange, placeholder, suffix }) {
  return e("label", { className: "block" },
    e("span", { className: "text-[13px] text-slate-400 tracking-wide" }, label),
    e("div", { className: "mt-1 flex items-center rounded-xl bg-slate-900 border border-slate-700 focus-within:border-amber-500/70 transition-colors" },
      e("input", {
        type: "number", inputMode: "decimal", value,
        onChange: (ev) => onChange(ev.target.value),
        placeholder,
        className: "w-full bg-transparent px-4 py-3.5 text-[22px] font-mono tabular-nums text-slate-50 outline-none placeholder:text-slate-600",
      }),
      suffix && e("span", { className: "pr-4 text-slate-500 text-sm shrink-0" }, suffix)
    )
  );
}

function CodeField({ label, value, onChange, placeholder }) {
  return e("label", { className: "block" },
    e("span", { className: "text-[13px] text-slate-400 tracking-wide" }, label || "銘柄コード"),
    e("div", { className: "mt-1 flex items-center rounded-xl bg-slate-900 border border-slate-700 focus-within:border-amber-500/70 transition-colors" },
      e("input", {
        type: "text", inputMode: "numeric", maxLength: 4, value,
        onChange: (ev) => onChange(ev.target.value.replace(/[^0-9]/g, "").slice(0, 4)),
        placeholder: placeholder || "例: 5803",
        className: "w-full bg-transparent px-4 py-3.5 text-[22px] font-mono tabular-nums text-slate-50 outline-none placeholder:text-slate-600",
      })
    )
  );
}

function ResultRow({ label, value, tone = "default" }) {
  const toneClass = tone === "risk" ? "text-red-400" : tone === "good" ? "text-emerald-400" : tone === "muted" ? "text-slate-400" : "text-slate-100";
  return e("div", { className: "flex items-baseline justify-between py-2 border-b border-slate-800/80 last:border-0" },
    e("span", { className: "text-[13px] text-slate-500" }, label),
    e("span", { className: `text-[16px] font-mono tabular-nums ${toneClass}` }, value)
  );
}

function ConstraintBadge({ binding, sharesByRisk, sharesByNotional }) {
  if (binding === null) return null;
  const isRisk = binding === "risk";
  return e("div", {
    className: `flex items-center gap-2 rounded-lg px-3 py-2 text-[12px] font-medium ${isRisk ? "bg-red-500/10 text-red-300 border border-red-500/25" : "bg-amber-500/10 text-amber-300 border border-amber-500/25"}`,
  },
    e(AlertTriangle, { size: 14, className: "shrink-0" }),
    e("span", null, isRisk
      ? `リスク上限で頭打ち（建玉代金上限なら${fmt(sharesByNotional)}株まで許容）`
      : `建玉代金上限で頭打ち（リスク上限だけなら${fmt(sharesByRisk)}株まで許容）`)
  );
}

function StockBadge({ code }) {
  const norm = normalizeCode(code);
  if (norm.length !== 4) return null;
  const info = WATCHLIST[norm];
  if (!info) {
    return e("div", { className: "inline-flex items-center gap-1 rounded-md bg-red-500/10 border border-red-500/25 px-2 py-1 text-[11px] text-red-300" },
      "監視リスト外（27銘柄外）");
  }
  const isGreen = info.cls === "green";
  const badgeColor = isGreen
    ? "bg-emerald-500/10 border-emerald-500/25 text-emerald-300"
    : "bg-amber-500/10 border-amber-500/25 text-amber-300";
  return e("div", { className: "flex flex-wrap items-center gap-1" },
    e("span", { className: `rounded-md border px-2 py-1 text-[11px] font-medium ${badgeColor}` },
      `${info.name}・${info.sector}${isGreen ? "・緑#" + info.rank : "・黄"}`),
    info.noMarket && e("span", { className: "rounded-md border border-red-500/25 bg-red-500/10 px-2 py-1 text-[11px] font-medium text-red-300" }, "成行禁止")
  );
}

function WatchlistPanel() {
  const [open, setOpen] = useState(false);
  return e("div", { className: "rounded-xl bg-slate-900/60 border border-slate-800" },
    e("button", {
      onClick: () => setOpen((o) => !o),

        e("div", { className: "flex flex-wrap gap-1" },
          YELLOW_ENTRIES.map((x) => e("span", {
            key: x.code,
            className: "rounded-md bg-amber-500/10 border border-amber-500/20 px-1.5 py-0.5 text-[11px] text-amber-300",
          }, `${x.name}(${x.code})${x.noMarket ? "・成行禁止" : ""}`))

}

function ViolationPanel({ violations }) {
  if (!violations || violations.length === 0) {
    return e("div", { className: "flex items-center gap-2 rounded-xl bg-emerald-500/10 border border-emerald-500/25 px-3.5 py-3 text-[13px] text-emerald-300" },
      e(Info, { size: 16, className: "shrink-0" }),
      e("span", null, "制約OK（重複・セクター・金融クラスタ・成行禁止の抵触なし）")
    );
  }
  return e("div", { className: "space-y-1.5" },
    violations.map((v, i) => e("div", {
      key: i,
      className: `flex items-start gap-2 rounded-xl px-3.5 py-2.5 text-[12.5px] border ${v.level === "error" ? "bg-red-500/10 border-red-500/25 text-red-300" : "bg-amber-500/10 border-amber-500/25 text-amber-300"}`,
    },
      e(AlertTriangle, { size: 14, className: "shrink-0 mt-0.5" }),
      e("span", null, v.text)
    ))
  );
}

function PhoenixSlotCard({ idx, slot, result, onChange }) {
  return e("div", { className: "rounded-xl bg-slate-900/60 border border-slate-800 p-3.5 space-y-2.5" },
    e("div", { className: "flex items-center justify-between" },
      e("span", { className: "text-[12.5px] font-semibold text-slate-300" }, `枠${idx + 1}`)

    e("div", { className: "grid grid-cols-1 gap-2" },

    result && result.error && e("div", { className: "flex items-start gap-2 rounded-lg bg-red-500/10 border border-red-500/25 px-3 py-2 text-[12px] text-red-300" },

    ),
    result && !result.error && e("div", { className: "rounded-lg bg-slate-950/60 border border-slate-800 px-3 py-1" },

      e(ResultRow, { label: "建玉代金", value: `¥${fmt(result.positionValue)}`, tone: "muted" }),
      e(ResultRow, { label: "SL（前場安値−0.3%）", value: `¥${fmtPrice(result.sl)}` }),

}

function TotalLossCard({ totalMaxLoss, overCap }) {
  return e("div", { className: `rounded-2xl border p-4 ${overCap ? "bg-red-500/10 border-red-500/30" : "bg-slate-900/60 border-slate-800"}` },
    e("div", { className: "flex items-baseline justify-between" },
      e("span", { className: "text-[12.5px] text-slate-400" }, "採用枠 最大損失合計（SL全到達時）"),
      e("span", { className: `text-[18px] font-mono font-bold tabular-nums ${overCap ? "text-red-300" : "text-slate-100"}` }, `−¥${fmt(totalMaxLoss)}`)
    ),
    e("div", { className: "mt-1 text-[11.5px] text-slate-500" }, `日次上限 ¥154,000（フェニックス）に対して${overCap ? "超過しています" : "収まっています"}`),
    overCap && e("div", { className: "mt-2 flex items-start gap-2 text-[12.5px] text-red-300" },
      e(AlertTriangle, { size: 14, className: "shrink-0 mt-0.5" }),
      e("span", null, "SL全到達なら日次上限超過")
    ),
    e("div", { className: "mt-2 text-[11px] text-slate-600" }, "候補が競合したら緑内順位（バッジの「緑#」）の小さい方を優先")
  );
}

function PhoenixCalc() {
  const [slots, setSlots] = useState([0, 1, 2, 3, 4].map(() => ({ code: "", entry: "", morningLow: "" })));
  const updateSlot = (idx, field, value) => {
    setSlots((prev) => prev.map((s, i) => (i === idx ? { ...s, [field]: value } : s)));
  };
  const results = useMemo(() => slots.map((s) => computePhoenixSlot(s.entry, s.morningLow)), [slots]);
  const violations = useMemo(() => computeViolations(slots), [slots]);
  const totalMaxLoss = useMemo(
    () => results.reduce((sum, r) => sum + ((r && !r.error) ? r.maxLoss : 0), 0),
    [results]
  );
  const overCap = totalMaxLoss > 154000;

  return e("div", { className: "space-y-4" },
    e(WatchlistPanel),
    e(ViolationPanel, { violations }),
    e("div", { className: "space-y-3" },
      slots.map((s, idx) => e(PhoenixSlotCard, { key: idx, idx, slot: s, result: results[idx], onChange: updateSlot }))
    ),
    e(TotalLossCard, { totalMaxLoss, overCap })
  );
}

function AtypeCalc() {
  const [c2open, setC2open] = useState("");
  const [c2high, setC2high] = useState("");
  const RISK_CAP = 44000, NOTIONAL_CAP = 1000000;

  const r = useMemo(() => {
    const entry = parseFloat(c2open), spikeHigh = parseFloat(c2high);
    if (!entry || !spikeHigh || entry <= 0 || spikeHigh <= 0) return null;
    if (spikeHigh <= entry) return { error: "2本目高値が2本目始値以下です。入力を確認してください。" };
    const tick = tickSize(entry);
    const sl = Math.round((spikeHigh + tick) * 100) / 100;
    const riskPerShare = sl - entry;
    const tp = roundDownTick(entry * 0.97, tick);
    const sharesByRisk = Math.floor(RISK_CAP / riskPerShare / 100) * 100;
    const sharesByNotional = Math.floor(NOTIONAL_CAP / entry / 100) * 100;
    const finalShares = Math.min(sharesByRisk, sharesByNotional);
    if (finalShares <= 0) return { error: "建玉代金上限に対して株価が高すぎます（100株単位で売建不可）。見送り推奨。" };
    const binding = sharesByRisk <= sharesByNotional ? "risk" : "notional";
    return {
      tick, sl, tp, riskPerShare, sharesByRisk, sharesByNotional, finalShares, binding,
      positionValue: finalShares * entry, maxLoss: finalShares * riskPerShare, maxGain: finalShares * (entry - tp),
    };
  }, [c2open, c2high]);

  return e("div", { className: "space-y-5" },
    e("div", { className: "flex items-start gap-2 rounded-xl bg-slate-900/60 border border-slate-800 px-3.5 py-3 text-[12px] text-slate-400" },
      e(Info, { size: 14, className: "shrink-0 mt-0.5" }),
      e("span", null, "発注可能3銘柄: ルネサス(6723)・フジクラ(5803)・村田製作所(6981)。これ以外は発注禁止・記録のみ（§3.1）")
    ),
    e("div", { className: "grid grid-cols-1 gap-3" },
      e(NumberField, { label: "2本目の始値（＝エントリー価格）", value: c2open, onChange: setC2open, placeholder: "例: 1500", suffix: "円" }),
      e(NumberField, { label: "2本目の高値（スパイク高値）", value: c2high, onChange: setC2high, placeholder: "例: 1545", suffix: "円" })
    ),
    r && r.error && e("div", { className: "flex items-start gap-2 rounded-xl bg-red-500/10 border border-red-500/25 px-3.5 py-3 text-[13px] text-red-300" },
      e(AlertTriangle, { size: 16, className: "shrink-0 mt-0.5" }),
      e("span", null, r.error)
    ),
    r && !r.error && e(React.Fragment, null,
      e("div", { className: "rounded-2xl bg-gradient-to-b from-slate-800/80 to-slate-900 border border-slate-700 p-5 text-center" },
        e("div", { className: "text-[12px] text-slate-400 tracking-wide mb-1" }, "推奨株数（売建）"),
        e("div", { className: "text-[44px] leading-none font-mono font-bold tabular-nums text-emerald-400" },
          fmt(r.finalShares), e("span", { className: "text-[18px] text-slate-400 ml-1" }, "株")),
        e("div", { className: "mt-2 text-[13px] text-slate-400 font-mono tabular-nums" }, `建玉代金 ¥${fmt(r.positionValue)}`)
      ),
      e(ConstraintBadge, { binding: r.binding, sharesByRisk: r.sharesByRisk, sharesByNotional: r.sharesByNotional }),
      e("div", { className: "rounded-xl bg-slate-900/60 border border-slate-800 px-4 py-1" },
        e(ResultRow, { label: "呼値（細かい呼値・TOPIX500）", value: `¥${r.tick}`, tone: "muted" }),
        e(ResultRow, { label: "SL（スパイク高値+1呼値）", value: `¥${fmtPrice(r.sl)}` }),
        e(ResultRow, { label: "TP（エントリー×0.97・切下げ）", value: `¥${fmtPrice(r.tp)}`, tone: "good" }),
        e(ResultRow, { label: "1株あたりリスク", value: `¥${fmtPrice(r.riskPerShare)}`, tone: "muted" })
      ),
      e("div", { className: "rounded-xl bg-slate-900/60 border border-slate-800 px-4 py-1" },
        e(ResultRow, { label: "最大損失（SL到達時）", value: `−¥${fmt(r.maxLoss)}`, tone: "risk" }),
        e(ResultRow, { label: "想定利益（TP到達時）", value: `+¥${fmt(r.maxGain)}`, tone: "good" })
      )
    )
  );
}

function App() {
  const [tab, setTab] = useState("phoenix");
  return e("div", {
    className: "min-h-screen bg-slate-950 text-slate-100 flex justify-center",
    style: { paddingTop: "env(safe-area-inset-top)", paddingBottom: "env(safe-area-inset-bottom)" },
  },
    e("div", { className: "w-full max-w-md px-4 pt-6 pb-10" },
      e("div", { className: "mb-5" },
        e("h1", { className: "text-[20px] font-bold tracking-tight text-slate-50" }, "ポジションサイジング"),
        e("p", { className: "text-[12px] text-slate-500 mt-0.5" }, "リスク上限 ÷ SL距離 と 建玉代金上限 の小さい方を採用")
      ),
      e("div", { className: "grid grid-cols-2 gap-1.5 p-1 rounded-xl bg-slate-900 border border-slate-800 mb-5" },
        e("button", {
          onClick: () => setTab("phoenix"),
          className: `flex items-center justify-center gap-1.5 py-2.5 rounded-lg text-[14px] font-medium transition-colors ${tab === "phoenix" ? "bg-slate-100 text-slate-900" : "text-slate-400"}`,
        }, e(TrendingUp, { size: 15 }), "フェニックス"),
        e("button", {
          onClick: () => setTab("atype"),
          className: `flex items-center justify-center gap-1.5 py-2.5 rounded-lg text-[14px] font-medium transition-colors ${tab === "atype" ? "bg-slate-100 text-slate-900" : "text-slate-400"}`,
        }, e(TrendingDown, { size: 15 }), "A型")
      ),
      tab === "phoenix" ? e(PhoenixCalc) : e(AtypeCalc),
      e("div", { className: "mt-6 flex items-start gap-2 rounded-xl bg-slate-900/50 border border-slate-800 px-3.5 py-3 text-[12px] text-slate-500" },
        e(Info, { size: 14, className: "shrink-0 mt-0.5" }),
        e("span", null, "フェニックス同時保有最大5枠（セクター上限3・金融上限4）・1日損失上限15.4万円／A型1日1件・上限8.8万円／合算24.2万円で当日全システム停止。")
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(e(App));
</script>
</body>
